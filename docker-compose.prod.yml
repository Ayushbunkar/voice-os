version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: voiceos_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voiceos_network

  redis:
    image: redis:7-alpine
    container_name: voiceos_redis_prod
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - voiceos_network

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: voiceos_api_prod
    restart: always
    env_file:
      - ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - voiceos_network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: voiceos_web_prod
    restart: always
    env_file:
      - ./web/.env.local
    depends_on:
      - api
    networks:
      - voiceos_network

  nginx:
    image: nginx:1.27-alpine
    container_name: voiceos_nginx_prod
    restart: always
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    networks:
      - voiceos_network

  certbot:
    image: certbot/certbot:latest
    container_name: voiceos_certbot
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  postgres_data:
  redis_data:
  letsencrypt:
  certbot_www:

networks:
  voiceos_network:
    driver: bridge
